<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0F0F0F"/>
  <title>Mi Agenda — Barbería Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* â•â•â•â•â•â•â•â•â•â•â• TOKENS â•â•â•â•â•â•â•â•â•â•â• */
    :root {
      --gold:#C9A84C; --gold-l:#E8C97A; --gold-d:#9A7B32; --gradient-gold: linear-gradient(135deg, var(--gold-d), var(--gold), var(--gold-l));
      --bg:#0F0F0F; --s1:#181818; --s2:#222; --s3:#2A2A2A; --border:#333;
      --muted:#888; --base:#D4D4D4; --bright:#F5F0E8;
      --green:#27AE60; --green-bg:rgba(39,174,96,.1); --green-border:rgba(39,174,96,.25);
      --red:#E74C3C; --red-bg:rgba(231,76,60,.1); --red-border:rgba(231,76,60,.25);
      --blue:#3498DB; --blue-bg:rgba(52,152,219,.1); --blue-border:rgba(52,152,219,.25);
      --gold-bg:rgba(201,168,76,.1); --gold-border:rgba(201,168,76,.25);
      --serif:Arial, Helvetica, sans-serif; --sans:'Inter',system-ui,sans-serif;
      --tr:all .22s cubic-bezier(.4,0,.2,1);
      --gutter:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);background:var(--bg);color:var(--base);
         min-height:100dvh;overflow-x:hidden;
         -webkit-font-smoothing:antialiased}
         
    @media (min-width: 768px) {
      .staff-header { padding: 20px 5% 16px; }
      .dates-bar { justify-content: center; padding-top: 16px; padding-bottom: 16px; }
      .timeline-section { padding: 32px 40px 100px; }
    }
    
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--s1)}
    ::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:4px}

    /* â•â•â•â•â•â•â•â•â•â•â• HEADER â•â•â•â•â•â•â•â•â•â•â• */
    .staff-header{
      position:sticky;top:0;z-index:50;
      background:rgba(15,15,15,.97);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:16px var(--gutter) 14px;
    }
    .hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .hdr-greeting{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em}
    .hdr-name{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--bright);margin-top:2px}
    .hdr-avatar{
      width:44px;height:44px;border-radius:12px;overflow:hidden;
      border:2px solid var(--gold-d);flex-shrink:0;cursor:pointer;
      position:relative;
    }
    .hdr-avatar img{width:100%;height:100%;object-fit:cover}
    .hdr-actions { display: flex; align-items: center; gap: 12px; }
    .btn-logout {
      background: var(--s2); border: 1px solid var(--border);
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--red); cursor: pointer; transition: var(--tr);
    }
    .btn-logout:hover { background: var(--red-bg); border-color: var(--red-border); }
    .btn-logout svg { width: 18px; height: 18px; }

    /* Summary pills */
    .hdr-pills{display:flex;gap:8px;flex-wrap:wrap}
    .pill{
      display:inline-flex;align-items:center;gap:5px;
      padding:8px 16px;border-radius:999px;font-size:.9rem;font-weight:600;
      border:1px solid var(--border);background:var(--s2);
    }
    .pill-gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold-bg)}
    .pill-green{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}
    .pill-blue{border-color:var(--blue-border);color:var(--blue);background:var(--blue-bg)}

    /* ——————————— DATE SELECTOR ——————————— */
    .cal-day {
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      border-radius: 12px; font-size: 0.95rem; margin: 0 auto; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500; color: var(--bright);
    }
    .cal-day:hover {
      background: var(--s2);
    }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day.empty:hover { background: transparent; }
    .cal-day.selected {
      background: var(--gradient-gold);
      color: #111;
      font-weight: 800;
      box-shadow: 0 0 20px rgba(225, 178, 74, 0.6); 
      transform: scale(1.15) translateY(-2px);
      border: none;
    }
    .modal-glass {
      background: rgba(20, 20, 22, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    /* ——————————— TIMELINE ——————————— */
    .timeline-section{padding:12px var(--gutter) 100px; max-width:900px; margin:0 auto;}
    .tl-label{
      font-size:.68rem;color:var(--muted);text-transform:uppercase;
      letter-spacing:.14em;margin-bottom:12px;
      display:flex;align-items:center;gap:8px;
    }
    .tl-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .timeline{position:relative;margin-left:50px}
    .timeline::before{
      content:'';position:absolute;top:0;bottom:0;left:0;
      width:2px;background:var(--border);border-radius:1px;
    }
    /* Now marker */
    .now-marker{
      position:absolute;left:-5px;width:12px;height:12px;
      background:var(--red);border-radius:50%;z-index:5;
      box-shadow:0 0 8px rgba(231,76,60,.5);
      animation:nowPulse 2s infinite;
    }
    .now-line{
      position:absolute;left:0;right:0;height:2px;
      background:var(--red);z-index:4;opacity:.5;
    }
    @keyframes nowPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}

    /* Slot row */
    .slot{position:relative;min-height:60px;padding-left:24px;border-bottom:1px dashed rgba(51,51,51,.5)}
    .slot-time{
      position:absolute;left:-58px;top:-1px;width:46px;text-align:right;
      font-size:.7rem;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;
    }
    .slot-dot{
      position:absolute;left:-4px;top:6px;width:8px;height:8px;
      border-radius:50%;background:var(--s3);border:2px solid var(--border);z-index:2;
    }
    .slot.has-appt .slot-dot{background:var(--gold);border-color:var(--gold)}
    .slot.completed .slot-dot{background:var(--green);border-color:var(--green)}
    .slot.no-show .slot-dot{background:var(--red);border-color:var(--red)}

    /* Empty slot */
    .slot-empty{
      padding:8px 14px;font-size:.72rem;color:rgba(136,136,136,.4);
      font-style:italic;
    }

    /* ——————————— APPOINTMENT CARD ——————————— */
    .appt-card{
      margin:4px 0 4px 0;padding:14px;border-radius:14px;
      background: linear-gradient(145deg, rgba(34,34,34,0.6), rgba(20,20,20,0.95));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      transition:var(--tr);position:relative;overflow:hidden;
    }
    .appt-card::before{
      content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      border-radius:3px 0 0 3px;
    }
    /* State colors */
    .appt-card.st-pendiente{border-color:var(--gold-border)}
    .appt-card.st-pendiente::before{background:var(--gold)}
    .appt-card.st-en_silla{border-color:var(--blue-border);background:var(--blue-bg)}
    .appt-card.st-en_silla::before{background:var(--blue)}
    .appt-card.st-completada{border-color:var(--green-border);background:var(--green-bg);opacity:.75}
    .appt-card.st-completada::before{background:var(--green)}
    .appt-card.st-no_asistio{border-color:var(--red-border);background:var(--red-bg);opacity:.6}
    .appt-card.st-no_asistio::before{background:var(--red)}
    .appt-card.st-no_catalogada{border-color:var(--border);background:var(--s1);opacity:.6}
    .appt-card.st-no_catalogada::before{background:var(--muted)}

    .appt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
    .appt-client{font-weight:700;font-size:.88rem;color:var(--bright);line-height:1.2}
    .appt-time{font-size:.68rem;color:var(--muted);margin-top:1px}
    .appt-status{
      font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
      padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;
    }
    .appt-status.st-pendiente{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
    .appt-status.st-en_silla{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
    .appt-status.st-completada{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
    .appt-status.st-no_asistio{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
    .appt-status.st-no_catalogada{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}

    .appt-services{
      display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;
    }
    .appt-svc-chip{
      font-size:.65rem;padding:3px 8px;border-radius:999px;
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      color:var(--base);
    }
    .appt-dur{font-size:.65rem;padding:3px 8px;border-radius:999px;
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      color:var(--muted);
    }

    .appt-actions{display:flex;gap:6px;flex-wrap:wrap}
    .act-btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:7px 12px;border-radius:10px;border:none;
      font-size:.7rem;font-weight:700;cursor:pointer;
      transition:var(--tr);letter-spacing:.02em;
    }
    .act-btn:active{transform:scale(.96)}
    .act-btn svg{width:14px;height:14px;flex-shrink:0}
    .act-start{background:var(--blue);color:#fff}
    .act-start:hover{background:#2980B9}
    .act-finish{background:var(--green);color:#fff}
    .act-finish:hover{background:#1e8449}
    .act-noshow{background:var(--s3);color:var(--muted);border:1px solid var(--border)}
    .act-noshow:hover{border-color:var(--red);color:var(--red)}
    .act-wa{
      background:#25D366;color:#fff;padding:7px 10px;border-radius:10px;
      border:none;cursor:pointer;transition:var(--tr);display:inline-flex;
      align-items:center;justify-content:center;
    }
    .act-wa:hover{background:#1ebe5d}

    /* ——————————— EMPTY STATE ——————————— */
    .empty-day{
      text-align:center;padding:60px 20px;
    }
    .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.3}
    .empty-title{font-family:var(--serif);font-size:1.1rem;color:var(--bright);margin-bottom:6px}
    .empty-sub{font-size:.8rem;color:var(--muted);line-height:1.5}

    /* ——————————— LOADING ——————————— */
    .loading-spinner{
      display:flex;align-items:center;justify-content:center;padding:60px 0;
    }
    .spinner{
      width:28px;height:28px;border:3px solid var(--border);
      border-top-color:var(--gold);border-radius:50%;
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ——————————— TOAST ——————————— */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
      background:var(--s2);border:1px solid var(--border);color:var(--bright);
      padding:12px 20px;border-radius:14px;font-size:.82rem;font-weight:600;
      z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);
      transition:transform .3s ease, opacity .3s ease;opacity:0;
      display:flex;align-items:center;gap:8px;max-width:90vw;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-icon{font-size:1.1rem;flex-shrink:0}
  </style>
</head>
<body>

  <!-- ————————— HEADER ————————— -->
  <header class="staff-header">
    <div class="hdr-row">
      <div>
        <p class="hdr-greeting" id="hdr-greeting">Buenos días</p>
        <h1 class="hdr-name" id="hdr-name">Carlos</h1>
      </div>
      <div class="hdr-actions">
        <div class="hdr-avatar" id="hdr-avatar">
          <img src="../assets/img/barbers/carlos.png" alt="Foto de perfil"/>
        </div>
        <button class="btn-logout" onclick="app.logout()" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="hdr-pills" id="hdr-pills">
      <span class="pill pill-gold" id="pill-citas">📅 — citas hoy</span>
      <span class="pill pill-green" id="pill-next">⏳ Cargando...</span>
    </div>
  </header>

  <!-- ————————— DATE SELECTOR ————————— -->
  <div class="date-selector-wrap" style="padding: 12px var(--gutter); max-width: 900px; margin: 0 auto;">
    <button onclick="openCalendarModal()" style="width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: var(--bright); font-family: inherit; font-size: 1rem; transition: var(--tr);">
      <span style="font-weight: 600;">Seleccionar Fecha</span>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span id="selected-date-lbl" style="color: var(--gold); font-weight: 700;"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      </div>
    </button>
  </div>

  <!-- ————————— TIMELINE ————————— -->
  <section class="timeline-section">
    <div class="tl-label" id="tl-label">Agenda del día</div>
    <div id="timeline-container">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </section>

  <!-- ————————— TOAST ————————— -->
  <div class="toast" id="toast">
    <span class="toast-icon"></span>
    <span class="toast-msg"></span>
  </div>

  <!-- Premium Calendar Modal -->
  <div id="calendar-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(8px); animation: fadeIn 0.3s ease;">
    <div class="modal-content modal-glass" style="border-radius:24px; width:100%; max-width:400px; padding:28px; position:relative;">
      <button onclick="closeCalendarModal()" style="position:absolute; top:16px; right:20px; background:rgba(255,255,255,0.1); border:none; color:var(--bright); width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s;">&times;</button>
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; margin-top:36px;">
        <button id="cal-prev" onclick="changeMonth(-1)" onmouseover="this.style.background='var(--s3)';this.style.borderColor='var(--gold)'" onmouseout="this.style.background='var(--s2)';this.style.borderColor='var(--border)'" style="background:var(--s2); border:1px solid var(--border); color:var(--gold); border-radius:50%; width:44px; height:44px; cursor:pointer; transition:var(--tr); display:flex; align-items:center; justify-content:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h3 id="cal-month-year" style="margin:0; color:var(--gold); font-family:var(--serif); font-size:1.5rem; font-weight:800; letter-spacing:0.5px; text-transform:capitalize;"></h3>
        <button id="cal-next" onclick="changeMonth(1)" onmouseover="this.style.background='var(--s3)';this.style.borderColor='var(--gold)'" onmouseout="this.style.background='var(--s2)';this.style.borderColor='var(--border)'" style="background:var(--s2); border:1px solid var(--border); color:var(--gold); border-radius:50%; width:44px; height:44px; cursor:pointer; transition:var(--tr); display:flex; align-items:center; justify-content:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>

      <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; text-align:center; font-size:0.8rem; font-weight:700; color:var(--muted); margin-bottom:16px; text-transform:uppercase; letter-spacing:1px;">
        <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
      </div>
      <div id="cal-days-grid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px 4px;">
        <!-- JS fills this -->
      </div>
    </div>
  </div>

  <script>
  (() => {
    /* ——— Config ——— */
    const API = '../sistema';

    // 🛡️ Interceptor Global de Fetch para Inyectar JWT
    const originalFetch = window.fetch;
    window.fetch = async function() {
      let [resource, config] = arguments;
      if (typeof resource === 'string' && resource.includes('/sistema/')) {
        config = config || {};
        config.headers = config.headers || {};
        const token = localStorage.getItem('mi_token_jwt');
        if (token) {
          config.headers['Authorization'] = `Bearer ${token}`;
        }
      }
      return originalFetch(resource, config);
    };

    // Barbero actual — se carga desde la sesión
    let BARBERO_ID = null;
    let BARBERO_DATA = null;
    let selectedDate  = null;
    let citasDelDia   = [];
    let horariosMap   = null;

    let HORA_INICIO = 9;   // 09:00
    let HORA_FIN    = 20;  // 20:00

    const STATUS_LABELS = {
      pendiente:  'Pendiente',
      confirmada: 'Confirmada',
      en_silla:   'En silla',
      completada: 'Finalizada',
      no_asistio: 'No asistió',
    };

    /* ——— Init ——— */
    async function init() {
      // Tab-isolation check
      if (!sessionStorage.getItem('tab_auth')) {
        window.location.href = 'login.html';
        return;
      }

      const user = await checkAuth();
      if (!user) return; // redirect happened

      BARBERO_ID = user.barbero_id;
      updateGreeting();

      // Set header from session data
      document.getElementById('hdr-name').textContent = user.barbero_nombre || user.username;
      if (user.barbero_foto && user.barbero_foto.trim() !== '') {
        // La foto ya trae la ruta desde la BD o es base64
        const imgPath = user.barbero_foto.startsWith('data:image') ? user.barbero_foto : '../' + user.barbero_foto;
        document.getElementById('hdr-avatar').querySelector('img').src = imgPath;
      } else {
        document.getElementById('hdr-avatar').querySelector('img').src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.barbero_nombre || 'Barbero') + '&background=C9A84C&color=0F0F0F';
      }

      await loadHorarios();
      initDates();
      
      // Auto-refresh silent cada 30 seg
      setInterval(() => {
        if (selectedDate) loadCitas(true);
      }, 30000);
    }

    let globalHorariosMap = null;

    /* ——— Load Horarios ——— */
    async function loadHorarios() {
      try {
        const resH = await fetch(`${API}/obtener_datos.php?tabla=horarios&barbero_id=${BARBERO_ID}`);
        const jsonH = await resH.json();
        if (jsonH.success && jsonH.data) {
          horariosMap = jsonH.data;
        }
        
        // Fetch admin global settings (horarios generales con barbero_id=0)
        const resG = await fetch(`${API}/obtener_datos.php?tabla=horarios&barbero_id=0`);
        const jsonG = await resG.json();
        if (jsonG.success && jsonG.data) {
          globalHorariosMap = jsonG.data;
        }
      } catch (e) {
        console.error('Error loading schedule', e);
      }
    }
    
    function updateScheduleForDate(isoDate) {
      const d = new Date(isoDate + 'T12:00:00');
      const diaSemana = d.getDay(); // número: 0=Dom, 1=Lun, etc.
      
      let scheduleForDay = null;

      // IMPORTANTE: MySQL devuelve dia_semana como STRING ("1"), getDay() es NUMBER (1).
      // Usamos Number() para que la comparación funcione correctamente.
      if (Array.isArray(horariosMap) && horariosMap.length > 0) {
        scheduleForDay = horariosMap.find(s => Number(s.dia_semana) === diaSemana);
      }

      // Si el barbero no tiene un horario personalizado ese día, usamos el global (barbero 0)
      if (!scheduleForDay && Array.isArray(globalHorariosMap)) {
        scheduleForDay = globalHorariosMap.find(s => Number(s.dia_semana) === diaSemana);
      }
      
      if (scheduleForDay) {
        // activo también viene como string "0" o "1" desde MySQL
        if (Number(scheduleForDay.activo) === 0) {
           HORA_INICIO = null;
           HORA_FIN = null;
        } else {
           HORA_INICIO = parseInt(scheduleForDay.hora_inicio.substring(0,2), 10);
           HORA_FIN = parseInt(scheduleForDay.hora_fin.substring(0,2), 10);
           // Si cierra a y media (ej. 19:30), sumamos 1 a HORA_FIN para que el bucle dibuje el slot
           if (scheduleForDay.hora_fin.substring(3,5) !== '00') {
             HORA_FIN += 1;
           }
        }
      } else {
        HORA_INICIO = 9; 
        HORA_FIN = 20;
      }
    }

    /* ——— Auth Check ——— */
    async function checkAuth() {
      try {
        const token = localStorage.getItem('mi_token_jwt');
        if (!token) {
          window.location.href = 'login.html';
          return null;
        }

        const payloadBase64 = token.split('.')[1];
        const payloadDecoded = JSON.parse(atob(payloadBase64));

        // Simulamos la estructura esperada por el código viejo para evitar romper cosas
        const json = {
          success: true,
          data: {
            rol: payloadDecoded.rol,
            barbero_id: payloadDecoded.id,
            barbero_nombre: payloadDecoded.nombre || payloadDecoded.usuario,
            barbero_foto: localStorage.getItem('mi_foto_perfil') || ''
          }
        };

        // If admin, allow but they can pick any barbero later
        if (json.data.rol === 'admin' && !json.data.barbero_id) {
          // Admin viewing staff page - default to barbero 1
          json.data.barbero_id = 1;
          json.data.barbero_nombre = 'Admin';
        }
        return json.data;
      } catch(e) {
        window.location.href = 'login.html';
        return null;
      }
    }

    function updateGreeting() {
      const h = new Date().getHours();
      const el = document.getElementById('hdr-greeting');
      if (h < 12) el.textContent = 'Buenos días';
      else if (h < 19) el.textContent = 'Buenas tardes';
      else el.textContent = 'Buenas noches';
    }

    /* ——— Date Selector ——— */
    let currentCalMonth = new Date().getMonth() + 1;
    let currentCalYear = new Date().getFullYear();

    function initDates() {
      const hoy = new Date();
      const hoyISO = hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');
      
      selectedDate = hoyISO;
      updateDateLabel(hoyISO);
      
      // Load initial
      updateScheduleForDate(hoyISO);
      loadCitas();
    }
    
    function updateDateLabel(iso) {
      const d = new Date(iso + 'T12:00:00Z');
      const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      document.getElementById('selected-date-lbl').textContent = `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
    }

    window.openCalendarModal = function() {
      document.getElementById('calendar-modal').style.display = 'flex';
      if (selectedDate) {
        const parts = selectedDate.split('-');
        currentCalYear = parseInt(parts[0], 10);
        currentCalMonth = parseInt(parts[1], 10);
      }
      loadCalendarMonth(currentCalMonth, currentCalYear);
    }

    window.closeCalendarModal = function() {
      document.getElementById('calendar-modal').style.display = 'none';
    }

    window.changeMonth = function(delta) {
      currentCalMonth += delta;
      if (currentCalMonth > 12) {
        currentCalMonth = 1;
        currentCalYear++;
      } else if (currentCalMonth < 1) {
        currentCalMonth = 12;
        currentCalYear--;
      }
      loadCalendarMonth(currentCalMonth, currentCalYear);
    }

    function loadCalendarMonth(m, a) {
      const grid = document.getElementById('cal-days-grid');
      const title = document.getElementById('cal-month-year');
      const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      
      title.textContent = `${meses[m-1]} ${a}`;
      grid.innerHTML = '';
      
      const firstDay = new Date(`${a}-${String(m).padStart(2,'0')}-01T12:00:00Z`).getUTCDay();
      const daysInMonth = new Date(a, m, 0).getDate();
      
      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="cal-day empty"></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateISO = `${a}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let cls = 'cal-day';
        if (selectedDate === dateISO) cls += ' selected';
        grid.innerHTML += `<div class="${cls}" onclick="handleSelectDate('${dateISO}')">${d}</div>`;
      }
    }

    window.handleSelectDate = async function(isodate) {
      closeCalendarModal();
      selectedDate = isodate;
      updateDateLabel(isodate);
      updateScheduleForDate(selectedDate);
      await loadCitas();
    }

    /* ——— Load Citas ——— */
    async function loadCitas(silent = false) {
      const container = document.getElementById('timeline-container');
      if (!silent) {
        container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      }

      try {
        // Asegurarnos de que los horarios estén frescos antes de pintar
        await loadHorarios();
        if (selectedDate) {
          updateScheduleForDate(selectedDate);
        }

        const res = await fetch(`${API}/obtener_datos.php?tabla=citas&barbero_id=${BARBERO_ID}&fecha=${selectedDate}`, { cache: 'no-store' });
        const json = await res.json();
        citasDelDia = json.data || [];
        renderTimeline(silent);
        updatePills();
      } catch(e) {
        if (!silent) {
          container.innerHTML = '<div class="empty-day"><p class="empty-sub" style="color:var(--red)">Error al cargar la agenda</p></div>';
        }
      }
    }

    /* ——— Update Pills ——— */
    function updatePills() {
      const total = citasDelDia.length;
      const pillCitas = document.getElementById('pill-citas');
      const pillNext  = document.getElementById('pill-next');

      pillCitas.textContent = `📅 ${total} cita${total!==1?'s':''} hoy`;

      // Find next pending appointment
      const ahora = new Date();
      const ahoraStr = ahora.getHours().toString().padStart(2,'0')+':'+ahora.getMinutes().toString().padStart(2,'0');
      const hoyISO = ahora.getFullYear()+'-'+String(ahora.getMonth()+1).padStart(2,'0')+'-'+String(ahora.getDate()).padStart(2,'0');

      if (selectedDate !== hoyISO) {
        pillNext.textContent = '📋 ' + formatDateLabel(selectedDate);
        pillNext.className = 'pill pill-blue';
        return;
      }

      const proxima = citasDelDia.find(c =>
        (c.estado === 'pendiente' || c.estado === 'confirmada') &&
        c.hora_inicio.substring(0,5) > ahoraStr
      );

      if (proxima) {
        const diffMin = diffMinutes(ahoraStr, proxima.hora_inicio.substring(0,5));
        if (diffMin <= 60) {
          pillNext.textContent = `⏳ Próxima en ${diffMin} min`;
        } else {
          pillNext.textContent = `⏳ Próxima a las ${proxima.hora_inicio.substring(0,5)}`;
        }
        pillNext.className = 'pill pill-green';
      } else {
        const enSilla = citasDelDia.find(c => c.estado === 'en_silla');
        if (enSilla) {
          pillNext.textContent = '💈 En silla ahora';
          pillNext.className = 'pill pill-blue';
        } else {
          pillNext.textContent = '✅ Día libre';
          pillNext.className = 'pill pill-green';
        }
      }
    }

    function diffMinutes(from, to) {
      const [fh,fm] = from.split(':').map(Number);
      const [th,tm] = to.split(':').map(Number);
      return (th*60+tm) - (fh*60+fm);
    }

    function formatDateLabel(iso) {
      const d = new Date(iso + 'T12:00:00');
      const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      return dias[d.getDay()] + ' ' + d.getDate();
    }

    /* ——— Render Timeline ——— */
    function renderTimeline(silent = false) {
      const container = document.getElementById('timeline-container');

      if (HORA_INICIO === null) {
        container.innerHTML = `
          <div class="empty-day">
            <div class="empty-icon">☕</div>
            <p class="empty-title">Día Inactivo</p>
            <p class="empty-sub">Hoy no tienes horario laboral configurado.</p>
          </div>`;
        return;
      }

      // Expansión dinámica del horario para no ocultar citas tempranas o tardías
      if (HORA_INICIO !== null && citasDelDia && citasDelDia.length > 0) {
        citasDelDia.forEach(cita => {
          const startH = parseInt(cita.hora_inicio.substring(0, 2), 10);
          let endH = parseInt(cita.hora_fin.substring(0, 2), 10);
          if (cita.hora_fin.substring(3, 5) !== '00') endH += 1;
          
          if (startH < HORA_INICIO) HORA_INICIO = startH;
          if (endH > HORA_FIN) HORA_FIN = endH;
        });
      }

      // Build slot map (30-min blocks)
      const slots = [];
      for (let h = HORA_INICIO; h < HORA_FIN; h++) {
        slots.push({ time: `${String(h).padStart(2,'0')}:00`, appointments: [] });
        slots.push({ time: `${String(h).padStart(2,'0')}:30`, appointments: [] });
      }

      // Map appointments to slots
      const assignedSlots = new Set();
      citasDelDia.forEach(cita => {
        const startStr = cita.hora_inicio.substring(0,5);
        const endStr   = cita.hora_fin.substring(0,5);
        const startIdx = slots.findIndex(s => s.time === startStr);
        if (startIdx !== -1) {
          slots[startIdx].appointments.push(cita);
          // Mark slots this appointment spans
          const spanSlots = Math.ceil(diffMinutes(startStr, endStr) / 30);
          for (let j = 0; j < spanSlots; j++) {
            if (startIdx + j < slots.length) assignedSlots.add(startIdx + j);
          }
        }
      });

      // Check if today — for the "now" marker
      const ahora = new Date();
      const hoyISO = ahora.getFullYear()+'-'+String(ahora.getMonth()+1).padStart(2,'0')+'-'+String(ahora.getDate()).padStart(2,'0');
      const isToday = selectedDate === hoyISO;
      const nowMinutes = ahora.getHours() * 60 + ahora.getMinutes();

      let html = '<div class="timeline">';

      slots.forEach((slot, idx) => {
        // Skip slots that are "occupied" by a multi-block appointment (not the first)
        if (assignedSlots.has(idx) && slot.appointments.length === 0) return;

        const [sh, sm] = slot.time.split(':').map(Number);
        const slotMin = sh * 60 + sm;

        // Determine classes
        let slotClass = 'slot';
        if (slot.appointments.length > 0) {
          const st = slot.appointments[0].estado;
          if (st === 'completada') slotClass += ' completed';
          else if (st === 'no_asistio') slotClass += ' no-show';
          else slotClass += ' has-appt';
        }

        // Calculate height for multi-block appointments
        let extraHeight = '';
        if (slot.appointments.length > 0) {
          const cita = slot.appointments[0];
          const startStr = cita.hora_inicio.substring(0,5);
          const endStr   = cita.hora_fin.substring(0,5);
          const spanMin  = diffMinutes(startStr, endStr);
          const spanSlots = Math.ceil(spanMin / 30);
          if (spanSlots > 1) {
            extraHeight = `min-height:${spanSlots * 60}px`;
          }
        }

        html += `<div class="${slotClass}" style="${extraHeight}">`;
        html += `<span class="slot-time">${slot.time}</span>`;
        html += `<span class="slot-dot"></span>`;

        if (slot.appointments.length > 0) {
          slot.appointments.forEach(cita => {
            html += renderAppointmentCard(cita);
          });
        } else {
          html += `<div class="slot-empty">Disponible</div>`;
        }

        html += '</div>';

        // Insert now marker
        if (isToday && slotMin <= nowMinutes && (slotMin + 30) > nowMinutes) {
          const pct = ((nowMinutes - slotMin) / 30) * 60;
          html += `
            <div style="position:relative;height:0">
              <div class="now-marker" style="top:${pct - 6}px"></div>
              <div class="now-line" style="top:${pct}px;left:0"></div>
            </div>`;
        }
      });

      html += '</div>';

      if (citasDelDia.length === 0) {
        html = `
          <div class="empty-day">
            <div class="empty-icon">☕</div>
            <p class="empty-title">Sin citas agendadas</p>
            <p class="empty-sub">Disfruta tu tiempo libre o espera que alguien reserve contigo.</p>
          </div>`;
      }

      container.innerHTML = html;

      // Scroll to now marker if today
      if (isToday && !silent) {
        setTimeout(() => {
          const marker = container.querySelector('.now-marker');
          if (marker) marker.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      }
    }

    function renderAppointmentCard(cita) {

      const ahora = new Date();

      const hoyISO = ahora.getFullYear()+'-'+String(ahora.getMonth()+1).padStart(2,'0')+'-'+String(ahora.getDate()).padStart(2,'0');

          </a>`;
      } else if (realSt === 'en_silla') {
        actionsHTML = `
          <button class="act-btn act-finish" onclick="app.changeState('${cita.id}','completada')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
            Finalizar
          </button>
          <a href="${waLink}" target="_blank" class="act-wa" title="WhatsApp">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

          Servicio completado · $${cita.precio_total || 0} MXN</span>`;
      } else if (realSt === 'no_asistio') {
        actionsHTML = `<span style="font-size:.7rem;color:var(--red);display:flex;align-items:center;gap:4px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>

      return `
        <div class="appt-card st-${st}" data-id="${cita.id}">

              <div class="appt-time">${cita.hora_inicio.substring(0,5)} — ${cita.hora_fin.substring(0,5)}</div>
            </div>
            <span class="appt-status st-${st}">${displayStatus}</span>
          </div>
          <div class="appt-services">
            <span class="appt-svc-chip">💈 ${serviciosStr}</span>
            <span class="appt-dur">⏱️ ${durMin} min</span>
          </div>
          <div class="appt-actions">${actionsHTML}</div>

    }

    /* ——— Change State ——— */
    async function changeState(citaId, nuevoEstado) {
      try {
        const res = await fetch(`${API}/guardar_cita.php`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: citaId, estado: nuevoEstado }),
        });
        const json = await res.json();

        if (json.success) {
          // Update local data
          const cita = citasDelDia.find(c => c.id === citaId);
          if (cita) cita.estado = nuevoEstado;

          renderTimeline();
          updatePills();

          const msgs = {
            en_silla:   ['💈','Cliente en silla — ¡a trabajar!'],
            completada: ['✅','Servicio finalizado — ¡buen trabajo!'],
            no_asistio: ['❌','Marcado como no asistió'],
          };
          const [icon, msg] = msgs[nuevoEstado] || ['ℹ️','Estado actualizado'];
          showToast(icon, msg);
        } else {
          showToast('âš ï¸', json.message || 'Error al actualizar');
        }
      } catch(e) {
        showToast('âš ï¸', 'Error de conexión');
      }
    }

    /* â”€â”€â”€ Toast â”€â”€â”€ */
    function showToast(icon, msg) {
      const el = document.getElementById('toast');
      el.querySelector('.toast-icon').textContent = icon;
      el.querySelector('.toast-msg').textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }

    /* â”€â”€â”€ Logout â”€â”€â”€ */
    async function logout() {
      sessionStorage.removeItem('tab_auth');
      sessionStorage.removeItem('tab_auth');
      localStorage.removeItem('mi_token_jwt');
      window.location.href = 'login.html';
    }

    // Expose to HTML onclick
    window.app = { changeState, logout };

    init();
  })();
  </script>
