<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0F0F0F"/>
  <meta name="description" content="Selecciona los servicios que deseas reservar."/>
  <title>Paso 1 — Selecciona tus Servicios · Barbería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ─── TOKENS ─── */
    :root{
      --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#9A7B32;
      --bg:#0F0F0F;--s1:#181818;--s2:#222;--s3:#333;--border:#333;
      --muted:#888;--base:#D4D4D4;--bright:#F5F0E8;
      --green:#27AE60;--red:#E74C3C;
      --serif:'Playfair Display',serif;--sans:'Inter',system-ui,sans-serif;
      --tr:all .22s cubic-bezier(.4,0,.2,1);
      --gutter: clamp(12px, 3vw, 80px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);background:var(--bg);color:var(--base);
         -webkit-font-smoothing:antialiased;min-height:100dvh}
    img{display:block;max-width:100%}

    /* ─── HEADER ─── */
    .app-header{
      position:sticky;top:0;z-index:50;
      background:rgba(15,15,15,.96);backdrop-filter:blur(18px);
    }
    .hdr-inner{
      padding:14px var(--gutter);
    }
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0px}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:8px;
      background:linear-gradient(135deg,var(--gold-d),var(--gold));
      display:flex;align-items:center;justify-content:center;font-size:.95rem}
    .logo-name{font-family:var(--serif);font-size:1rem;font-weight:700;
      background:linear-gradient(135deg,var(--gold-l),var(--gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* ─── STEPS BAR ─── */
    .steps{display:flex;align-items:center;gap:0;margin-bottom:32px}
    .step-item{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .step-dot{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.72rem;font-weight:700;
      border:2px solid var(--border);color:var(--muted);
      transition:var(--tr);
    }
    .step-dot.active{background:var(--gold);border-color:var(--gold);color:#0F0F0F}
    .step-dot.done{background:transparent;border-color:var(--green);color:var(--green)}
    .step-label{font-size:.72rem;font-weight:500;color:var(--muted);transition:var(--tr)}
    .step-label.active{color:var(--gold)}
    .step-label.done{color:var(--green)}
    .step-line{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:20px}
    .step-line.done{background:var(--green)}

    /* ─── MAIN ─── */
    main{max-width:1400px;margin:0 auto;padding:28px var(--gutter) 200px}

    /* ─── SECTION TITLE ─── */
    .sec-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .sec-title{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--bright)}
    .badge-multi{font-size:.68rem;background:var(--s2);border:1px solid var(--border);
      color:var(--muted);padding:3px 10px;border-radius:999px}
    .divider-line{
      display:flex;align-items:center;gap:10px;margin-bottom:18px;
      color:var(--muted);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase
    }
    .divider-line::before,.divider-line::after{
      content:'';flex:1;height:1px;background:var(--border)
    }

    /* ─── SERVICE GRID ─── */
    #services-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    @media(min-width:768px){#services-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:1024px){#services-grid{grid-template-columns:repeat(3,1fr)}}

    /* ─── SERVICE CARD ─── */
    .svc-card{
      background:var(--s2);border:1.5px solid var(--border);
      border-radius:14px;padding:16px;padding-right:48px;
      display:flex;align-items:flex-start;gap:12px;
      cursor:pointer;transition:var(--tr);position:relative;
      user-select:none;
    }
    .svc-card:hover{border-color:rgba(201,168,76,.4);background:rgba(34,34,34,.9)}
    .svc-card.selected{
      border-color:var(--gold);
      background:rgba(201,168,76,.07);
      box-shadow:0 0 0 1px rgba(201,168,76,.2),0 4px 20px rgba(0,0,0,.4);
    }
    .svc-icon{
      width:44px;height:44px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,rgba(154,123,50,.2),rgba(201,168,76,.1));
      border:1px solid rgba(201,168,76,.2);
      display:flex;align-items:center;justify-content:center;font-size:1.25rem;
    }
    .svc-info{flex:1;min-width:0}
    .svc-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
    .svc-name{font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--bright)}
    .svc-price{font-size:.85rem;font-weight:700;color:var(--gold);white-space:nowrap}
    .svc-desc{font-size:.74rem;color:var(--muted);line-height:1.5;margin-bottom:7px}
    .svc-dur{
      display:inline-flex;align-items:center;gap:4px;
      font-size:.64rem;color:var(--muted);
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      border-radius:999px;padding:2px 8px;
    }
    .svc-check{
      position:absolute;top:12px;right:12px;
      width:20px;height:20px;border-radius:50%;
      border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:.68rem;font-weight:700;color:transparent;
      background:transparent;transition:var(--tr);flex-shrink:0;
    }
    .svc-card.selected .svc-check{
      border-color:var(--gold);background:var(--gold);color:#0F0F0F
    }

    /* ─── SKELETON ─── */
    .skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
      background-size:200%;animation:sk 1.4s infinite;border-radius:14px}
    @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ─── BOTTOM BAR ─── */
    .bottom-fade{
      position:fixed;bottom:0;left:0;right:0;height:160px;
      background:linear-gradient(to top,rgba(15,15,15,1) 50%,transparent);
      pointer-events:none;z-index:30;
    }
    .bottom-cta{
      position:fixed;bottom:0;left:0;right:0;z-index:40;
      padding:16px var(--gutter);
      padding-bottom:max(16px,env(safe-area-inset-bottom));
    }
    .bottom-inner{max-width:1400px;margin:0 auto}

    /* Pills */
    .pills{display:flex;justify-content:center;gap:8px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
    .pills::-webkit-scrollbar{display:none}
    .pill{
      display:inline-flex;align-items:center;gap:5px;
      background:var(--s2);border:1px solid var(--border);
      border-radius:999px;padding:5px 12px;
      font-size:.74rem;color:var(--muted);white-space:nowrap;flex-shrink:0;
    }
    .pill strong{color:var(--bright)}

    /* CTA button */
    .cta-btn{
      width:100%;max-width:400px;margin:0 auto;padding:16px 24px;border-radius:12px;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      font-family:var(--sans);font-size:1rem;font-weight:700;letter-spacing:.03em;
      background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));
      color:#0F0F0F;transition:var(--tr);
      box-shadow:0 4px 20px rgba(201,168,76,.3);
      position:relative;overflow:hidden;
    }
    .cta-btn::after{
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
      transition:left .5s;
    }
    .cta-btn:hover:not(:disabled)::after{left:150%}
    .cta-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.45)}
    .cta-btn:disabled{
      background:var(--s2);color:var(--muted);
      box-shadow:none;cursor:not-allowed;transform:none;
    }
    .cta-btn:disabled::after{display:none}
  </style>
</head>
<body>

  <header class="app-header" role="banner">
    <div class="hdr-inner">
      <!-- Top row -->
      <div class="hdr-top">
        <a href="../index.html" class="logo" aria-label="Barbería — Inicio">
          <div class="logo-mark" aria-hidden="true">✂️</div>
          <span class="logo-name">Barbería</span>
        </a>
        <a href="../index.html" style="font-size:.78rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .2s"
           onmouseenter="this.style.color='var(--gold)'" onmouseleave="this.style.color='var(--muted)'">
          ✖ Cancelar
        </a>
      </div>
    </div>
  </header>

  <main role="main" aria-labelledby="main-h">
    <!-- Steps -->
    <nav class="steps" aria-label="Pasos de reserva">
      <div class="step-item">
        <div class="step-dot active" aria-current="step">1</div>
        <span class="step-label active">Servicios</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-dot" aria-label="Paso 2 pendiente">2</div>
        <span class="step-label">Fecha &amp; Barbero</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-dot" aria-label="Paso 3 pendiente">3</div>
        <span class="step-label">Confirmar</span>
      </div>
    </nav>

    <!-- Greeting -->
    <section style="margin-bottom:28px">
      <p id="greeting-time" style="font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Buenos días 👋</p>
      <h1 id="main-h" style="font-family:var(--serif);font-size:1.7rem;font-weight:700;color:var(--bright);line-height:1.2;margin-bottom:5px">
        ¿Qué te hacemos
        <span style="background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">hoy?</span>
      </h1>
      <p style="font-size:.82rem;color:var(--muted)">Elige uno o más servicios. Después eliges fecha y barbero.</p>
    </section>

    <!-- Services -->
    <section aria-labelledby="svc-heading">
      <div class="sec-title-row">
        <h2 id="svc-heading" class="sec-title">Servicios</h2>
        <span class="badge-multi">Selección múltiple</span>
      </div>
      <div class="divider-line">Menú</div>

      <div id="services-grid" role="group" aria-label="Selecciona los servicios">
        <!-- Skeletons mientras carga -->
        <div class="skeleton" style="height:88px"></div>
        <div class="skeleton" style="height:88px;opacity:.7"></div>
        <div class="skeleton" style="height:88px;opacity:.5"></div>
        <div class="skeleton" style="height:88px;opacity:.4"></div>
        <div class="skeleton" style="height:88px;opacity:.3"></div>
        <div class="skeleton" style="height:88px;opacity:.2"></div>
      </div>
    </section>
  </main>

  <!-- Bottom fade overlay -->
  <div class="bottom-fade" aria-hidden="true"></div>

  <!-- Sticky bottom CTA -->
  <div class="bottom-cta" role="complementary" aria-label="Resumen y continuar">
    <div class="bottom-inner">
      <div class="pills" role="status" aria-live="polite">
        <div class="pill">🛍️ <strong id="pill-count">—</strong></div>
        <div class="pill">⏱️ <strong id="pill-dur">0 min</strong></div>
        <div class="pill">💰 <strong id="pill-price">$0 MXN</strong></div>
      </div>
      <button id="btn-continuar" class="cta-btn" onclick="goToStep2()"
              disabled aria-disabled="true" aria-label="Continuar al paso 2">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <span id="cta-label">Elige al menos un servicio</span>
      </button>
    </div>
  </div>

  <script>
  'use strict';
  const API = '../api';

  // Estado
  const state = { servicios: [], selIds: new Set(), totalPrecio: 0, totalDur: 0 };

  // Saludo
  const h = new Date().getHours();
  const grEl = document.getElementById('greeting-time');
  if(grEl) grEl.textContent = h<12?'Buenos días 👋':h<19?'Buenas tardes 👋':'Buenas noches 👋';

  // Cargar servicios
  async function loadServicios() {
    const grid = document.getElementById('services-grid');
    try {
      const r    = await fetch(`${API}/servicios`);
      const json = await r.json();
      state.servicios = json.data || [];
      renderServicios(grid);
    } catch(e) {
      grid.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);grid-column:1/-1">
        <p style="font-size:2rem;margin-bottom:8px">⚠️</p>
        <p>No se pudieron cargar los servicios</p>
        <p style="font-size:.75rem;margin-top:4px;color:#555">${e.message}</p>
        <button onclick="loadServicios()" style="margin-top:14px;padding:8px 20px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:var(--sans)">Reintentar</button>
      </div>`;
    }
  }

  function renderServicios(grid) {
    grid.innerHTML = '';
    state.servicios.forEach(svc => {
      const card = document.createElement('div');
      card.className = 'svc-card';
      card.id = `svc-${svc.id}`;
      card.setAttribute('role','checkbox');
      card.setAttribute('aria-checked','false');
      card.setAttribute('tabindex','0');
      card.setAttribute('aria-label',`${svc.nombre}, $${svc.precio} MXN, ${svc.duracion_min} minutos`);
      card.innerHTML = `
        <div class="svc-icon" aria-hidden="true">${svc.icono||'✂️'}</div>
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-name">${svc.nombre}</span>
            <span class="svc-price">$${parseFloat(svc.precio).toLocaleString('es-MX')} MXN</span>
          </div>
          <p class="svc-desc">${svc.descripcion||''}</p>
          <span class="svc-dur">⏱️ ${svc.duracion_min} min</span>
        </div>
        <div class="svc-check" aria-hidden="true">✓</div>`;
      const toggle = () => toggleSvc(card, svc);
      card.addEventListener('click', toggle);
      card.addEventListener('keydown', e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle();} });
      grid.appendChild(card);
    });
  }

  function toggleSvc(card, svc) {
    const id = svc.id;
    if(state.selIds.has(id)){
      state.selIds.delete(id);
      card.classList.remove('selected');
      card.setAttribute('aria-checked','false');
    } else {
      state.selIds.add(id);
      card.classList.add('selected');
      card.setAttribute('aria-checked','true');
    }
    recalc();
    updateCTA();
  }

  function recalc() {
    state.totalPrecio = 0; state.totalDur = 0;
    state.selIds.forEach(id => {
      const s = state.servicios.find(x => x.id===id);
      if(s){ state.totalPrecio += parseFloat(s.precio); state.totalDur += parseInt(s.duracion_min); }
    });
    const n = state.selIds.size;
    document.getElementById('pill-count').textContent  = n===0?'—':`${n} servicio${n>1?'s':''}`;
    document.getElementById('pill-dur').textContent    = `${state.totalDur} min`;
    document.getElementById('pill-price').textContent  = `$${state.totalPrecio.toLocaleString('es-MX')} MXN`;
  }

  function updateCTA() {
    const btn   = document.getElementById('btn-continuar');
    const label = document.getElementById('cta-label');
    const ok    = state.selIds.size > 0;
    btn.disabled = !ok;
    btn.setAttribute('aria-disabled', String(!ok));
    label.textContent = ok
      ? `Continuar — $${state.totalPrecio.toLocaleString('es-MX')} MXN · ${state.totalDur} min`
      : 'Elige al menos un servicio';
  }

  function goToStep2() {
    if(state.selIds.size === 0) return;
    const selSvcs = state.servicios.filter(s => state.selIds.has(s.id));
    sessionStorage.setItem('bb_step1', JSON.stringify({
      servicios:    selSvcs,
      serviciosIds: [...state.selIds],
      totalPrecio:  state.totalPrecio,
      totalDur:     state.totalDur,
    }));
    window.location.href = 'calendar.html';
  }

  // Cargar branding dinámico
  async function loadBranding() {
    try {
      const res = await fetch(`${API}/ajustes`);
      const json = await res.json();
      if (json.success && json.data) {
        const d = json.data;
        if (d.site_name) {
          const currentTitle = document.title;
          const stepPrefix = currentTitle.split('·')[0].trim();
          document.title = `${stepPrefix} · ${d.site_name}`;
          document.querySelectorAll('.logo-name').forEach(el => el.textContent = d.site_name);
        }
        document.querySelectorAll('.logo-mark').forEach(logoMark => {
          const src = d.site_logo || '../assets/img/logo.png';
          logoMark.innerHTML = `<img src="${src}" alt="Logo" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;" onerror="this.src='../assets/img/logo.png'">`;
          logoMark.style.background = 'transparent';
        });
      }
    } catch (e) {
      console.error('Error cargando branding:', e);
    }
  }

  // Init
  loadBranding();
  loadServicios();
  </script>
</body>
</html>
