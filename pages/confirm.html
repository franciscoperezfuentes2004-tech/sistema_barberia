<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0F0F0F"/>
  <title>Paso 3 — Confirmar · Barbería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#9A7B32;
      --bg:#0F0F0F;--s1:#181818;--s2:#222;--s3:#333;--border:#333;
      --muted:#888;--base:#D4D4D4;--bright:#F5F0E8;
      --green:#27AE60;--red:#E74C3C;
      --serif:Arial, Helvetica, sans-serif;--sans:'Inter',system-ui,sans-serif;
      --tr:all .22s cubic-bezier(.4,0,.2,1);
      --gutter: clamp(12px, 3vw, 80px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--base);min-height:100dvh}
    
    .app-header{position:sticky;top:0;z-index:50;background:rgba(15,15,15,.96);backdrop-filter:blur(18px);}
    .hdr-inner{padding:14px var(--gutter);}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0px}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold-d),var(--gold));display:flex;align-items:center;justify-content:center;font-size:.95rem}
    .logo-name{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--gold)}
    
    .steps{display:flex;align-items:center;gap:0;margin-bottom:32px}
    .step-item{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid var(--border);color:var(--muted);transition:var(--tr)}
    .step-dot.active{background:var(--gold);border-color:var(--gold);color:#0F0F0F}
    .step-dot.done{background:transparent;border-color:var(--green);color:var(--green)}
    .step-label{font-size:.72rem;font-weight:500;color:var(--muted);transition:var(--tr)}
    .step-label.active{color:var(--gold)}
    .step-label.done{color:var(--green)}
    .step-line{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:20px}
    .step-line.done{background:var(--green)}

    main{max-width:1400px;margin:0 auto;padding:28px var(--gutter) 100px}
    .confirm-wrapper{max-width:600px;margin:0 auto}
    .sec-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--bright);margin-bottom:20px;text-align:center}

    /* Summary Card */
    .summary-card{
      background: linear-gradient(145deg, rgba(34,34,34,0.6), rgba(20,20,20,0.95));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      border-radius:24px;padding:24px;margin-bottom:32px;
    }
    .sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .sum-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
    .sum-label{font-size:.8rem;color:var(--muted)}
    .sum-val{font-size:.9rem;font-weight:600;color:var(--bright);text-align:right}
    .sum-total{font-family:var(--serif);font-size:1.2rem;color:var(--gold)}

    /* Form */
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px}
    .form-input{
      width:100%;background:var(--s2);border:1px solid var(--border);color:var(--bright);
      padding:14px;border-radius:10px;font-family:var(--sans);font-size:.95rem;transition:var(--tr);
    }
    .form-input:focus{outline:none;border-color:var(--gold);background:var(--s1)}
    
    .cta-btn{
      width:100%;max-width:400px;margin:0 auto;display:block;padding:16px 24px;border-radius:12px;border:none;cursor:pointer;
      font-family:var(--sans);font-size:1rem;font-weight:700;
      background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));
      color:#0F0F0F;transition:var(--tr);margin-top:20px;
    }
    .cta-btn:disabled{background:var(--s2);color:var(--muted);cursor:not-allowed}

    /* Success Modal Premium */
    #success-modal{
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
      z-index:100;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1);
    }
    #success-modal.show{opacity:1;pointer-events:auto;}
    #success-modal .modal-content{
      background:linear-gradient(145deg, var(--s1), var(--bg));
      border:1px solid rgba(201,168,76,0.2);
      border-radius:24px; text-align:center; padding:40px 30px;
      max-width:380px; width:90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      transform: scale(0.95) translateY(20px); transition:all .4s cubic-bezier(.4,0,.2,1);
    }
    #success-modal.show .modal-content { transform: scale(1) translateY(0); }
    
    .check-circle{
      width:70px;height:70px;border-radius:50%;
      background:linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
      border:2px solid var(--gold);color:var(--gold);
      font-size:32px;display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px; box-shadow: 0 0 20px rgba(201,168,76,0.2);
    }
    .modal-title { font-family:var(--serif); font-size:1.8rem; color:var(--bright); margin-bottom:12px; }
    .modal-desc { color:var(--base); font-size:1rem; line-height:1.6; margin-bottom:20px; }
    .modal-highlight { color:var(--gold); font-weight:600; }
    .modal-divider { width:40px; height:2px; background:var(--gold); margin:0 auto 20px; border-radius:2px; opacity:0.5; }
    
    .modal-btn {
      width:100%; padding:14px 20px; border-radius:12px; border:none; cursor:pointer;
      font-family:var(--sans); font-size:1rem; font-weight:700;
      background:linear-gradient(135deg, var(--gold-d), var(--gold), var(--gold-l));
      color:#0f0f0f; transition:var(--tr);
    }
    .modal-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="hdr-inner">
      <div class="hdr-top">
        <a href="../index.html" class="logo">
          <div class="logo-mark">✂️</div>
          <span class="logo-name">Barbería</span>
        </a>
        <a href="calendar.html" style="font-size:.78rem;color:var(--muted);text-decoration:none">← Volver</a>
      </div>
    </div>
  </header>

  <main>
      <nav class="steps">
        <div class="step-item"><div class="step-dot done">✓</div></div>
        <div class="step-line done"></div>
        <div class="step-item"><div class="step-dot done">✓</div></div>
        <div class="step-line done"></div>
        <div class="step-item">
          <div class="step-dot active">3</div>
          <span class="step-label active">Confirmar</span>
        </div>
      </nav>

    <div class="confirm-wrapper">
      <h1 class="sec-title">Resumen de tu cita</h1>
    
    <div class="summary-card">
      <div class="sum-row">
        <div class="sum-label">Servicios</div>
        <div class="sum-val" id="sum-svc"></div>
      </div>
      <div class="sum-row">
        <div class="sum-label">Barbero</div>
        <div class="sum-val" id="sum-barber"></div>
      </div>
      <div class="sum-row">
        <div class="sum-label">Fecha y Hora</div>
        <div class="sum-val" id="sum-datetime"></div>
      </div>
      <div class="sum-row" style="border:none;margin-top:10px">
        <div class="sum-label">Total a pagar<br><small style="color:var(--muted)">Al finalizar el servicio</small></div>
        <div class="sum-val sum-total" id="sum-total"></div>
      </div>
    </div>

    <h2 class="sec-title" style="font-size:1.15rem;margin-bottom:15px">Tus Datos</h2>
    <form id="booking-form" onsubmit="event.preventDefault(); submitBooking();">
      <div class="form-group">
        <label class="form-label">Nombre Completo *</label>
        <input type="text" id="inp-nombre" class="form-input" required placeholder="Ej. Juan Pérez" oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
      </div>
        <div class="form-group">
          <label class="form-label">Teléfono (10 dígitos) *</label>
          <div style="display: flex; gap: 8px;">
            <select id="inp-lada" style="background: var(--s2); border: 1px solid var(--border); color: var(--bright); border-radius: 12px; padding: 14px; font-family: inherit;">
              <option value="+52">🇲🇽 +52</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+34">🇪🇸 +34</option>
              <option value="+54">🇦🇷 +54</option>
              <option value="+57">🇨🇴 +57</option>
              <option value="+56">🇨🇱 +56</option>
              <option value="+51">🇵🇪 +51</option>
            </select>
            <input type="tel" id="inp-telefono" class="form-input" required placeholder="Ej. 5551234567" maxlength="15" minlength="10" oninput="this.value = this.value.replace(/[^0-9\s-]/g, '')" style="flex: 1;">
          </div>
        </div>
      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" id="inp-email" class="form-input" placeholder="Para enviarte el recibo (Opcional)">
      </div>
      
      <div id="error-msg" style="color:var(--red);font-size:.85rem;margin-top:10px;display:none"></div>
      
      <button type="submit" id="btn-submit" class="cta-btn">Confirmar Reserva</button>
    </form>
    </div>
  </main>

  <!-- Success Modal -->
  <div id="success-modal">
    <div class="modal-content">
      <div class="check-circle">✓</div>
      <h2 class="modal-title">¡Reserva Confirmada!</h2>
      <p class="modal-desc">
        Tu lugar está asegurado. Te esperamos el <br>
        <span class="modal-highlight" id="succ-fecha"></span> a las <span class="modal-highlight" id="succ-hora"></span>
      </p>
      <div class="modal-divider"></div>
      <p style="color:var(--muted); font-size:0.85rem; margin-bottom:24px;">Gracias por elegir nuestra Barbería.<br>Nos vemos pronto.</p>
      <button onclick="window.location.href='../index.html'" class="modal-btn">Volver al inicio</button>
    </div>
  </div>

  <script>
    const API = '../sistema';

    const step1 = JSON.parse(sessionStorage.getItem('bb_step1') || 'null');
    const step2 = JSON.parse(sessionStorage.getItem('bb_step2') || 'null');

    if(!step1 || !step2) window.location.href = 'booking.html';

    // Rellenar resumen
    document.getElementById('sum-svc').innerHTML = step1.servicios.map(s => s.nombre).join('<br>');
    document.getElementById('sum-barber').textContent = step2.barberoNombre;
    
    // Formatear fecha
    const d = new Date(step2.fecha);
    // Ajustar zona horaria si es necesario para evitar off-by-one por UTC
    d.setMinutes(d.getMinutes() + d.getTimezoneOffset()); 
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const fechaStr = d.toLocaleDateString('es-ES', options);
    
    document.getElementById('sum-datetime').innerHTML = `<span style="text-transform:capitalize">${fechaStr}</span><br><span style="color:var(--gold)">${step2.horaInicio}</span>`;
    document.getElementById('sum-total').textContent = `$${step1.totalPrecio.toLocaleString('es-MX')} MXN`;

    async function submitBooking() {
      const btn = document.getElementById('btn-submit');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Procesando...';
      err.style.display = 'none';

      const nombre = document.getElementById('inp-nombre').value.trim();
      const lada = document.getElementById('inp-lada').value;
      const telefonoNum = document.getElementById('inp-telefono').value.trim();
      const email = document.getElementById('inp-email').value.trim();

      if (telefonoNum.length < 10) {
        err.textContent = 'El teléfono debe tener al menos 10 dígitos.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Confirmar Reserva';
        return;
      }
      
      const telefono = lada + ' ' + telefonoNum;

      try {
        const bodyCita = {
          nombre: nombre,
          telefono: telefono,
          email: email,
          barbero_id: step2.barberoId,
          servicios: step1.serviciosIds,
          fecha: step2.fecha,
          hora_inicio: step2.horaInicio
        };

        const resCita = await fetch(`${API}/guardar_cita.php`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(bodyCita)
        });
        const jsonCita = await resCita.json();
        if(!resCita.ok || !jsonCita.success) throw new Error(jsonCita.error || jsonCita.message || 'Error al crear la cita');

        // Éxito
        sessionStorage.removeItem('bb_step1');
        sessionStorage.removeItem('bb_step2');

        document.getElementById('succ-fecha').textContent = fechaStr;
        document.getElementById('succ-hora').textContent = step2.horaInicio;
        document.getElementById('success-modal').classList.add('show');

      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Confirmar Reserva';
        err.textContent = e.message;
        err.style.display = 'block';
      }
    }

    // Cargar branding dinámico
    async function loadBranding() {
      try {
        const res = await fetch(`${API}/obtener_datos.php?tabla=ajustes`);
        const json = await res.json();
        if (json.success && json.data) {
          const d = json.data;
          if (d.site_name) {
            const currentTitle = document.title;
            const stepPrefix = currentTitle.split('·')[0].trim();
            document.title = `${stepPrefix} · ${d.site_name}`;
            document.querySelectorAll('.logo-name').forEach(el => el.textContent = d.site_name);
          }
          document.querySelectorAll('.logo-mark').forEach(logoMark => {
            const src = d.site_logo || '../assets/img/logo.png';
            logoMark.innerHTML = `<img src="${src}" alt="Logo" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;" onerror="this.src='../assets/img/logo.png'">`;
            logoMark.style.background = 'transparent';
          });
        }
      } catch (e) {
        console.error('Error cargando branding:', e);
      }
    }
    loadBranding();
  </script>
</body>
</html>
