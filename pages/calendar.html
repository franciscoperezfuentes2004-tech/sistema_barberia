<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0F0F0F"/>
  <title>Paso 2 — Fecha y Barbero · Barbería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gradient-green: linear-gradient(135deg, #2ecc71, #27ae60);
      --gradient-gold: linear-gradient(135deg, #F3A183, #E1B24A);
      --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#9A7B32;
      --bg:#0F0F0F;--s1:#181818;--s2:#222;--s3:#333;--border:#333;
      --muted:#888;--base:#D4D4D4;--bright:#F5F0E8;
      --green:#27AE60;--red:#E74C3C;
      --serif:Arial, Helvetica, sans-serif;--sans:'Inter',system-ui,sans-serif;
      --tr:all .22s cubic-bezier(.4,0,.2,1);
      --gutter: clamp(12px, 3vw, 80px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--base);min-height:100dvh}
    
    .app-header{
      position:sticky;top:0;z-index:50;
      background:rgba(15,15,15,.96);backdrop-filter:blur(18px);
    }
    .hdr-inner{padding:14px var(--gutter);}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0px}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold-d),var(--gold));display:flex;align-items:center;justify-content:center;font-size:.95rem}
    .logo-name{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--gold)}
    
    .steps{display:flex;align-items:center;gap:0;margin-bottom:32px;justify-content:center;width:100%;}
    .step-item{display:flex;align-items:center;gap:clamp(3px, 1vw, 6px);flex-shrink:0}
    .step-dot{width:clamp(20px, 6vw, 26px);height:clamp(20px, 6vw, 26px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(0.65rem, 2vw, 0.72rem);font-weight:700;border:2px solid var(--border);color:var(--muted);transition:var(--tr)}
    .step-dot.active{background:var(--gold);border-color:var(--gold);color:#0F0F0F}
    .step-dot.done{background:transparent;border-color:var(--green);color:var(--green)}
    .step-label{font-size:clamp(0.6rem, 2.5vw, 0.72rem);font-weight:500;color:var(--muted);transition:var(--tr)}
    .step-label.active{color:var(--gold)}
    .step-label.done{color:var(--green)}
    .step-line{flex:1;height:1px;background:var(--border);margin:0 clamp(4px, 1.5vw, 8px);min-width:10px}
    .step-line.done{background:var(--green)}

    main{max-width:1400px;margin:0 auto;padding:28px clamp(12px, 3vw, 24px) 200px}
    .sec-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .sec-title{font-family:var(--serif);font-size:1.3rem;font-weight:600;color:var(--gold-l);letter-spacing:0.02em}
    .divider-line{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:var(--muted);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}
    .divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:var(--border)}

    /* Dates */
    .dates-scroll{display:flex;gap:10px;justify-content:flex-start;flex-wrap:wrap;padding-bottom:8px}
    .date-card{
      background:var(--bg);border:1px solid var(--border);border-radius:16px;
      min-width:76px;padding:14px 10px;text-align:center;cursor:pointer;transition:var(--tr);
      flex-shrink:0;user-select:none;
    }
    .date-card:hover:not(.selected){border-color:rgba(201,168,76,.4)}
    .date-card.selected{border-color:var(--gold);background:linear-gradient(145deg, rgba(201,168,76,.1), transparent);box-shadow:0 8px 25px rgba(0,0,0,.5)}
    .date-day{font-size:.68rem;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:600}
    .date-num{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--bright)}
    .date-month{font-size:.65rem;color:var(--muted);margin-top:2px}
    .date-card.selected .date-day,.date-card.selected .date-num{color:var(--gold)}

    /* Barbers */
    #barbers-grid{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:14px;}
    .barber-card{
      width: 170px;
      background:linear-gradient(to bottom, var(--s1), var(--bg));border:1px solid var(--border);border-radius:16px;
      overflow:hidden;cursor:pointer;transition:var(--tr);text-align:center;
      opacity: 0.5; pointer-events: none;
    }
    .barber-card.available { opacity: 1; pointer-events: auto; }
    .barber-card:hover:not(.selected){border-color:rgba(201,168,76,.4)}
    .barber-card.selected{border-color:var(--gold);background:linear-gradient(to bottom, rgba(201,168,76,.1), var(--bg));box-shadow:0 8px 30px rgba(0,0,0,.5)}
    .barber-photo-wrap{padding:18px 16px 6px;display:flex;justify-content:center}
    .barber-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid var(--border);filter:grayscale(40%);transition:var(--tr);box-shadow:0 4px 15px rgba(0,0,0,.5)}
    .barber-card.selected .barber-photo{filter:grayscale(0);border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.3)}
    .barber-info{padding:6px 10px 16px}
    .barber-name{font-family:var(--serif);font-size:.9rem;font-weight:600;color:var(--bright);margin-bottom:2px}
    .barber-spec{font-size:.7rem;color:var(--muted);margin-bottom:6px}
    .barber-badge{
      display:inline-block;font-size:.65rem;padding:3px 8px;border-radius:99px;
      background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);
    }
    .barber-badge.ok{background:rgba(39,174,96,.1);color:var(--green);border-color:rgba(39,174,96,.3)}
    .barber-badge.sold-out{background:rgba(231,76,60,.1);color:var(--red);border-color:rgba(231,76,60,.3)}
    
    /* Timeslots */
    #times-grid{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:10px}
    .time-slot{
      width: 95px;
      background:var(--bg);border:1px solid var(--border);border-radius:12px;
      padding:12px 0;text-align:center;cursor:pointer;transition:var(--tr);
      font-size:.9rem;font-weight:600;color:var(--base);
    }
    .time-slot:hover:not(.disabled){border-color:var(--gold);color:var(--gold)}
    .time-slot.selected{background:var(--gold);border-color:var(--gold);color:#0F0F0F}
    .time-slot.covered{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:var(--gold)}
    .time-slot.disabled{opacity:0.35;text-decoration:line-through;cursor:not-allowed;background:transparent;border-color:transparent;color:var(--muted)}
    .time-slot.disabled:hover{border-color:transparent}

    /* Summary & CTA */
    .bottom-cta{
      position:fixed;bottom:0;left:0;right:0;z-index:40;
      padding:16px var(--gutter);padding-bottom:max(16px,env(safe-area-inset-bottom));
      background:linear-gradient(to top,rgba(15,15,15,1) 80%,transparent);
    }
    .bottom-inner{max-width:1400px;margin:0 auto}
    .cta-btn{
      width:100%;max-width:400px;margin:0 auto;padding:16px 24px;border-radius:12px;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      font-family:var(--sans);font-size:1rem;font-weight:700;
      background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));
      color:#0F0F0F;transition:var(--tr);
    }
    .cta-btn:disabled{background:var(--s2);color:var(--muted);cursor:not-allowed}

    /* Premium Calendar Grid UI */
    .cal-day {
      width: clamp(28px, 10vw, 42px); height: clamp(28px, 10vw, 42px); display: flex; align-items: center; justify-content: center;
      border-radius: clamp(8px, 2vw, 12px); font-size: clamp(0.8rem, 3vw, 0.95rem); margin: 0 auto; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
    }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day.hoy { 
      background: var(--gradient-gold); 
      color: #111; 
      font-weight: 800; 
      box-shadow: 0 4px 15px rgba(225, 178, 74, 0.4);
      border: none;
    }
    .cal-day.disponible { 
      background: var(--gradient-green); 
      color: #111; 
      font-weight: 800; 
      box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
      border: none; 
    }
    .cal-day.disponible:hover { 
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.6);
      transform: translateY(-2px) scale(1.05);
    }
    .cal-day.lleno { 
      background: rgba(231, 76, 60, 0.05);
      border: 1px dashed rgba(231, 76, 60, 0.4); 
      color: #e74c3c; 
    }
    .cal-day.pasado { 
      border: 1px solid transparent; 
      color: #444; 
      background: transparent; 
      cursor: not-allowed; 
      opacity: 0.5;
    }
    .cal-day.cerrado { 
      border: 1px solid transparent; 
      color: #555; 
      background: rgba(255,255,255,0.01); 
      cursor: not-allowed; 
      text-decoration: line-through;
    }
    
    .cal-day.selected {
      background: var(--gradient-gold);
      color: #111;
      font-weight: 800;
      box-shadow: 0 0 20px rgba(225, 178, 74, 0.6); 
      transform: scale(1.15) translateY(-2px);
      border: none;
    }
    
    .modal-glass {
      background: rgba(20, 20, 22, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    
    /* Responsive Alignment for Mobile */
    @media (max-width: 768px) {
      .dates-scroll, #barbers-grid, #times-grid {
        justify-content: center;
      }
    }
    .cal-nav-btn:hover { background:rgba(255,255,255,0.1) !important; border-color:var(--gold) !important; color:var(--gold) !important; transform:translateY(-2px); box-shadow:0 6px 15px rgba(225,178,74,0.2); }
  </style>

  <style>
    @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
    .barber-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .barber-card:hover { transform: translateY(-4px); box-shadow: var(--glass-shadow); border-color: rgba(225,178,74,0.4); }
    .cta-btn { background: var(--gradient-gold); border: none; color: #111; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s, box-shadow 0.2s; }
    .cta-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(225,178,74,0.4); }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="hdr-inner">
      <div class="hdr-top">
        <a href="../index.html" class="logo">
          <div class="logo-mark">✂️</div>
          <span class="logo-name">Barbería</span>
        </a>
        <a href="booking.html" style="font-size:.78rem;color:var(--muted);text-decoration:none">← Volver</a>
      </div>
    </div>
  </header>

  <main>
      <nav class="steps">
        <div class="step-item">
          <div class="step-dot done">✓</div>
          <span class="step-label done">Servicios</span>
        </div>
        <div class="step-line done"></div>
        <div class="step-item">
          <div class="step-dot active">2</div>
          <span class="step-label active">Fecha &amp; Barbero</span>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
          <div class="step-dot">3</div>
          <span class="step-label">Confirmar</span>
        </div>
      </nav>

    <style>
      .booking-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }
      @media (min-width: 992px) {
        .booking-layout {
          grid-template-columns: 1fr 1fr;
          gap: 32px;
          align-items: start;
        }
      }
      .panel-card {
        background: linear-gradient(145deg, rgba(34,34,34,0.6), rgba(20,20,20,0.95));
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.06);
        border-top: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
      }
      .panel-title {
        font-family: var(--serif);
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--bright);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .panel-title-num {
        background: rgba(201,168,76,0.15);
        color: var(--gold);
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 0.9rem;
        font-family: var(--sans);
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: 16px;
        font-size: 0.9rem;
      }
    </style>

    <div class="booking-layout">
      <!-- Columna Izquierda: Fecha y Barbero -->
      <div style="display: flex; flex-direction: column; gap: 24px;">
        
        <!-- 1. Fechas -->
        <div class="panel-card">
          <h2 class="panel-title"><span class="panel-title-num">1</span> Elige tu día</h2>
          <button id="btn-open-calendar" class="cta-btn" style="width:100%; margin:0; background:var(--s1); border:1px solid var(--border); color:var(--bright); font-weight:600; box-shadow:none;" onclick="openCalendarModal()">
            🗓️ Abrir Calendario
          </button>
          <div id="selected-date-display" style="margin-top:16px; font-size:1.1rem; color:var(--gold); font-weight:700; display:none; align-items:center; gap:8px; justify-content:center; background:rgba(201,168,76,0.1); padding:12px; border-radius:12px;">
            <!-- JS fills this -->
          </div>
        </div>

        <!-- 2. Barberos -->
        <div class="panel-card" id="sec-barberos" style="display:none; opacity:0; transition:opacity .3s">
          <h2 class="panel-title"><span class="panel-title-num">2</span> Elige a tu barbero</h2>
          <div id="barbers-grid">
            <!-- JS generates barbers here -->
          </div>
        </div>
      </div>

      <!-- Columna Derecha: Horarios -->
      <div class="panel-card" style="min-height: 400px; display: flex; flex-direction: column;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
          <h2 class="panel-title" style="margin-bottom:0;"><span class="panel-title-num">3</span> Horarios disponibles</h2>
          <span id="dur-badge" style="font-size:.75rem;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);padding:6px 14px;border-radius:999px;display:none; font-weight: 600; letter-spacing: 0.3px;"></span>
        </div>
        
        <div id="horarios-empty-state" class="empty-state" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
          <div style="font-size: 2rem; margin-bottom: 12px; opacity: 0.5;">🕒</div>
          <p>Selecciona una fecha y un barbero primero<br>para ver los horarios disponibles.</p>
        </div>

        <section id="sec-horarios" style="display:none; opacity:0; transition:opacity .3s">
          <div id="times-grid">
            <!-- JS generates timeslots here -->
          </div>
          <div id="delay-msg" style="display:none; margin-top:15px; padding:12px; border:1px solid var(--gold); background:rgba(201,168,76,.1); color:var(--gold); border-radius:8px; font-size:.9rem; line-height:1.4;"></div>
        </section>
      </div>

    </div>
  </main>

  <div class="bottom-cta">
    <div class="bottom-inner">
      <button id="btn-continuar" class="cta-btn" disabled onclick="goToStep3()">
        Continuar al resumen →
      </button>
    </div>
  </div>


  <!-- Premium Calendar Modal -->
  <div id="calendar-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:clamp(10px, 3vw, 20px); backdrop-filter:blur(8px); animation: fadeIn 0.3s ease;">
    <div class="modal-content modal-glass" style="border-radius:24px; width:100%; max-width:400px; padding:clamp(14px, 4vw, 28px); position:relative;">
      <button class="cal-nav-btn" onclick="closeCalendarModal()" style="position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05); color:var(--muted); width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; z-index:10;">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; margin-top:48px;">
        <button class="cal-nav-btn" id="cal-prev" onclick="changeMonth(-1)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--bright); border-radius:12px; width:44px; height:44px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center;">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h3 id="cal-month-year" style="margin:0; background:var(--gradient-gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-family:var(--serif); font-size:1.6rem; font-weight:800; letter-spacing:0.5px;">Mayo 2026</h3>
        <button class="cal-nav-btn" id="cal-next" onclick="changeMonth(1)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--bright); border-radius:12px; width:44px; height:44px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center;">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:clamp(4px, 1.5vw, 8px); text-align:center; margin-bottom:16px;">
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Do</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Lu</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Ma</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Mi</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Ju</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Vi</div>
        <div style="color:var(--muted); font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Sa</div>
      </div>

      <div id="cal-days-grid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:10px clamp(4px, 1.5vw, 8px);">
        <!-- JS fills this -->
      </div>

      <div style="margin-top:28px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); display:flex; flex-wrap:wrap; gap:16px; font-size:0.8rem; font-weight:500; color:var(--muted); justify-content:center;">
        <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:18px; height:18px; border-radius:4px; background:var(--gradient-gold); box-shadow:0 2px 8px rgba(225,178,74,0.3);"></span> Hoy</div>
        <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:18px; height:18px; border-radius:4px; background:var(--gradient-green); box-shadow:0 2px 8px rgba(39,174,96,0.4);"></span> Disp.</div>
        <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:18px; height:18px; border-radius:4px; border:1px dashed #e74c3c;"></span> Lleno</div>
      </div>
    </div>
  </div>

      <div id="cal-days-grid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px 6px;">
        <!-- JS fills this -->
      </div>

      <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:12px; font-size:0.75rem; color:var(--muted); justify-content:center;">
        <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--gold); border:2px solid var(--gold);"></span> Hoy</div>
        <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; border:2px solid #27ae60;"></span> Disponible</div>
        <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; border:2px solid #e74c3c;"></span> Lleno</div>
        <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; border:2px solid #444;"></span> Pasado</div>
      </div>
    </div>
  </div>

  <script>
    const API = '../sistema';

    // 1. Validar state del paso 1
    const step1 = JSON.parse(sessionStorage.getItem('bb_step1') || 'null');
    if(!step1 || !step1.servicios || step1.servicios.length === 0) {
      window.location.href = 'booking.html';
    }

    const state = {
      fecha: null,
      barberoId: null,
      barberoNombre: null,
      horaInicio: null,
      duracion: step1.totalDur || 30
    };

    document.getElementById('dur-badge').textContent = `Requiere ${state.duracion} min`;

    let currentCalMonth = new Date().getMonth() + 1;
    let currentCalYear = new Date().getFullYear();

    async function openCalendarModal() {
      document.getElementById('calendar-modal').style.display = 'flex';
      await loadCalendarMonth(currentCalMonth, currentCalYear);
    }

    function closeCalendarModal() {
      document.getElementById('calendar-modal').style.display = 'none';
    }

    async function changeMonth(delta) {
      currentCalMonth += delta;
      if (currentCalMonth > 12) {
        currentCalMonth = 1;
        currentCalYear++;
      } else if (currentCalMonth < 1) {
        currentCalMonth = 12;
        currentCalYear--;
      }
      await loadCalendarMonth(currentCalMonth, currentCalYear);
    }

    async function loadCalendarMonth(m, a) {
      const grid = document.getElementById('cal-days-grid');
      const title = document.getElementById('cal-month-year');
      const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      
      title.textContent = `${meses[m-1]} ${a}`;
      grid.innerHTML = '<div style="grid-column:1/-1; padding:20px; color:var(--muted);">Cargando...</div>';

      try {
        const res = await fetch(`${API}/calendario.php?mes=${m}&anio=${a}&duracion=${state.duracion}`);
        const json = await res.json();
        
        if (!json.success) throw new Error('Error de API');
        
        grid.innerHTML = '';
        
        const firstDay = new Date(`${a}-${String(m).padStart(2,'0')}-01T12:00:00Z`).getUTCDay();
        for (let i = 0; i < firstDay; i++) {
          grid.innerHTML += `<div class="cal-day empty"></div>`;
        }

        json.data.forEach(dia => {
          const d = new Date(dia.fecha + 'T12:00:00Z').getUTCDate();
          let cls = 'cal-day ' + dia.estado;
          
          let onclick = '';
          if (dia.estado === 'hoy' || dia.estado === 'disponible') {
            onclick = `onclick="selectDate('${dia.fecha}')"`;
          }

          if (state.fecha === dia.fecha) cls += ' selected';

          grid.innerHTML += `<div class="${cls}" ${onclick}>${d}</div>`;
        });
      } catch(e) {
        grid.innerHTML = '<div style="grid-column:1/-1; color:var(--red);">Error cargando fechas</div>';
      }
    }

    async function selectDate(isodate) {
      closeCalendarModal();
      state.fecha = isodate;
      state.barberoId = null;
      state.horaInicio = null;
      updateCTA();

      const parts = isodate.split('-');
      const d = new Date(isodate + 'T12:00:00Z');
      const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const text = `${dias[d.getUTCDay()]} ${parts[2]} de ${meses[parseInt(parts[1])-1]}`;
      
      const display = document.getElementById('selected-date-display');
      display.innerHTML = `<span>📅</span> ${text}`;
      display.style.display = 'flex';
      
      document.getElementById('sec-horarios').style.display = 'none';
      const emptyState = document.getElementById('horarios-empty-state');
      if(emptyState) emptyState.style.display = 'flex';
      document.getElementById('times-grid').innerHTML = '';
      
      document.getElementById('sec-barberos').style.display = 'block';
      setTimeout(() => document.getElementById('sec-barberos').style.opacity = '1', 10);
      
      await loadBarberos();
      
      const durBadge = document.getElementById('dur-badge');
      if (durBadge) {
        const slotsNecesarios = calcSlots(state.duracion);
        durBadge.innerHTML = `⏱️ ${state.duracion} min <span style="opacity:0.7; font-weight:400; font-size:0.7rem; margin-left:4px;">(${slotsNecesarios} bloque${slotsNecesarios > 1 ? 's' : ''})</span>`;
        durBadge.style.display = 'inline-flex';
      }
    }

    function calcSlots(duracion) {
      let b = Math.floor(duracion / 30);
      let rem = duracion % 30;
      if (rem > 10 || b === 0) b++;
      return b;
    }

    function decodeHtml(html) {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    }

    
    async function loadBarberos() {
      const grid = document.getElementById('barbers-grid');
      grid.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Cargando barberos...</div>';
      try {
        const res = await fetch(`${API}/obtener_datos.php?tabla=barberos&activos=1&fecha=${state.fecha}&duracion=${state.duracion}`);
        const json = await res.json();
        renderBarberos(json.data || []);
      } catch(e) {
        grid.innerHTML = '<div style="color:var(--red)">Error cargando barberos</div>';
      }
    }

    function renderBarberos(barberos) {
      const grid = document.getElementById('barbers-grid');
      grid.innerHTML = '';
      
      barberos.forEach(b => {
        let card = document.createElement('div');
        const hasSlots = b.slots_disponibles > 0;
        card.className = `barber-card ${hasSlots ? 'available' : ''}`;
        card.id = `bar-${b.id}`;
        
        const badge = hasSlots 
          ? `<span class="barber-badge ok">${b.slots_disponibles} espacios</span>`
          : `<span class="barber-badge sold-out">Agotado</span>`;
        
        // Manejar URLs absolutas y relativas de fotos
        let fotoSrc = 'https://via.placeholder.com/150';
        if (b.foto) {
          fotoSrc = (b.foto.startsWith('http') || b.foto.startsWith('data:')) ? b.foto : '../' + b.foto;
        } else if (b.imagen_url) {
          fotoSrc = (b.imagen_url.startsWith('http') || b.imagen_url.startsWith('data:')) ? b.imagen_url : '../' + b.imagen_url;
        }
        
        // Decodificar especialidad para evitar doble escape HTML
        const especialidad = decodeHtml(b.especialidad || 'Barbero');
          
        card.innerHTML = `
          <div class="barber-photo-wrap">
            <img src="${fotoSrc}" class="barber-photo" alt="${b.nombre}">
          </div>
          <div class="barber-info">
            <div class="barber-name">${decodeHtml(b.nombre)} ${decodeHtml(b.apellido)}</div>
            <div class="barber-spec">${especialidad}</div>
            ${badge}
          </div>
        `;
        
        if(hasSlots) {
          card.onclick = () => selectBarber(card, b.id, `${decodeHtml(b.nombre)} ${decodeHtml(b.apellido)}`);
        }
        grid.appendChild(card);
      });
    }

    async function selectBarber(cardEl, barberoId, nombre) {
      document.querySelectorAll('.barber-card').forEach(c => c.classList.remove('selected'));
      cardEl.classList.add('selected');
      state.barberoId = barberoId;
      state.barberoNombre = nombre;
      state.horaInicio = null;
      updateCTA();
      
      const emptyState = document.getElementById('horarios-empty-state');
      if(emptyState) emptyState.style.display = 'none';
      
      const secH = document.getElementById('sec-horarios');
      secH.style.display = 'block';
      setTimeout(()=> secH.style.opacity = '1', 10);
      
      const grid = document.getElementById('times-grid');
      grid.innerHTML = '<div style="color:var(--muted);font-size:.85rem;grid-column:1/-1">Cargando horarios...</div>';
      
      try {
        const res = await fetch(`${API}/disponibilidad.php?barbero_id=${barberoId}&fecha=${state.fecha}&duracion=${state.duracion}`, { cache: 'no-store' });
        const json = await res.json();
        renderHorarios(json.data?.slots || []);
      } catch(e) {
        grid.innerHTML = `<div style="color:var(--red);grid-column:1/-1">Error al cargar horarios</div>`;
      }
    }

    function renderHorarios(slots) {
      const grid = document.getElementById('times-grid');
      const delayMsg = document.getElementById('delay-msg');
      grid.innerHTML = '';
      if (delayMsg) delayMsg.style.display = 'none';
      
      // Si la fecha seleccionada es HOY, deshabilitar horarios que ya pasaron
      const ahora = new Date();
      const hoy = ahora.getFullYear() + '-' + String(ahora.getMonth()+1).padStart(2,'0') + '-' + String(ahora.getDate()).padStart(2,'0');
      if (state.fecha === hoy) {
        const horaActual = String(ahora.getHours()).padStart(2,'0') + ':' + String(ahora.getMinutes()).padStart(2,'0');
        slots.forEach(s => {
          if (s.hora_inicio <= horaActual) {
            s.disponible = false;
          }
        });
      }
      
      // Filtrar: si no hay slots con disponible=true, mostrar mensaje
      const hayDisponibles = slots.some(s => s.disponible);
      if(slots.length === 0 || !hayDisponibles) {
        grid.innerHTML = '<div style="color:var(--muted);font-size:.85rem;grid-column:1/-1">No hay horarios que acomoden tu servicio este día.</div>';
        return;
      }
      
      slots.forEach((s, idx) => {
        let el = document.createElement('button');
        el.className = `time-slot ${!s.disponible ? 'disabled' : ''}`;
        el.textContent = s.hora_inicio;
        if(s.disponible) {
          el.onclick = () => {
            document.querySelectorAll('.time-slot').forEach(c => c.classList.remove('selected', 'covered'));
            
            // Calcular cuántos bloques de 30 min ocupa el servicio
            const slotsNecesarios = calcSlots(state.duracion);
            for(let i = 0; i < slotsNecesarios; i++) {
              const sibling = grid.children[idx + i];
              if(sibling && !sibling.classList.contains('disabled')) {
                if(i === 0) sibling.classList.add('selected');
                else sibling.classList.add('covered');
              }
            }
            
            state.horaInicio = s.hora_inicio;
            
            if (s.retraso_minutos > 0) {
              delayMsg.style.display = 'block';
              delayMsg.innerHTML = `⚠️ <b>Aviso:</b> El barbero podría terminar la cita anterior con un retraso de <b>aproximadamente ${Math.ceil(s.retraso_minutos)} minutos</b>. Tendría que esperar ese tiempo.`;
            } else {
              delayMsg.style.display = 'none';
            }

            updateCTA();
          };
        } else {
          el.disabled = true;
        }
        grid.appendChild(el);
      });
      
      // Mostrar indicador de duración
      const durBadge = document.getElementById('dur-badge');
      if (durBadge) {
        const slotsNecesarios = calcSlots(state.duracion);
        durBadge.textContent = `Requiere ${state.duracion} min (${slotsNecesarios} bloque${slotsNecesarios > 1 ? 's' : ''} de 30 min)`;
      }
    }

    function updateCTA() {
      const btn = document.getElementById('btn-continuar');
      if(state.fecha && state.barberoId && state.horaInicio) {
        btn.disabled = false;
        btn.textContent = `Confirmar para las ${state.horaInicio} →`;
      } else {
        btn.disabled = true;
        btn.textContent = 'Completa tu selección';
      }
    }

    function goToStep3() {
      if(!state.fecha || !state.barberoId || !state.horaInicio) return;
      sessionStorage.setItem('bb_step2', JSON.stringify({
        fecha: state.fecha,
        barberoId: state.barberoId,
        barberoNombre: state.barberoNombre,
        horaInicio: state.horaInicio
      }));
      window.location.href = 'confirm.html';
    }

    // Cargar branding dinámico
    async function loadBranding() {
      try {
        const res = await fetch(`${API}/obtener_datos.php?tabla=ajustes`);
        const json = await res.json();
        if (json.success && json.data) {
          const d = json.data;
          if (d.site_name) {
            const currentTitle = document.title;
            const stepPrefix = currentTitle.split('·')[0].trim();
            document.title = `${stepPrefix} · ${d.site_name}`;
            document.querySelectorAll('.logo-name').forEach(el => el.textContent = d.site_name);
          }
          document.querySelectorAll('.logo-mark').forEach(logoMark => {
            const src = d.site_logo || '../assets/img/logo.png';
            logoMark.innerHTML = `<img src="${src}" alt="Logo" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;" onerror="this.src='../assets/img/logo.png'">`;
            logoMark.style.background = 'transparent';
          });
        }
      } catch (e) {
        console.error('Error cargando branding:', e);
      }
    }

    // Inicializar
    loadBranding();
    openCalendarModal();
  </script>
</body>
</html>
